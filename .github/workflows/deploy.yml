name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # Allow manual trigger from the GitHub UI

permissions:
  contents: read
  pages:    write
  id-token: write

# Only one deployment runs at a time; cancel the previous one if a new push comes in
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── 1. Build ──────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (static export)
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  # ── 2. Deploy ─────────────────────────────────────────────────────────────
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
